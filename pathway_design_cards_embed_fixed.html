<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Pathway Design Cards</title>
<style>
  :root {
    --bg: #2f2f2f;
    --text: #222;
    --muted: #666;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: Arial, Helvetica, sans-serif;
    background: var(--bg);
    color: white;
  }
  .wrap { max-width: 1200px; margin: 0 auto; padding: 24px 20px 40px; }
  .topbar { display:flex; justify-content:space-between; align-items:end; gap:20px; margin-bottom:18px; }
  h1 { font-size:34px; margin:0; letter-spacing:.02em; }
  .sub { color:#ddd; font-size:16px; line-height:1.4; max-width:780px; margin-top:6px; }
  .meta { color:#ddd; font-size:14px; white-space:nowrap; }
  .toolbar { display:flex; flex-wrap:wrap; gap:10px 12px; align-items:center; margin:10px 0 20px; }
  select, button { font-size:14px; padding:10px 12px; border-radius:10px; border:none; }
  button { background:white; color:#111; cursor:pointer; }
  .stage { display:grid; grid-template-columns:140px 1fr 140px; gap:14px; align-items:center; }
  .navbtn { width:100%; min-height:52px; font-weight:700; }
  .cardbox { display:flex; flex-direction:column; align-items:center; }
  .flip-wrap { perspective:1800px; width:min(100%, 430px); }
  .flip { position:relative; width:100%; aspect-ratio:4.28 / 7.5; transform-style:preserve-3d; transition:transform .7s ease; }
  .flip.is-flipped { transform:rotateY(180deg); }
  .side { position:absolute; inset:0; backface-visibility:hidden; border-radius:10px; overflow:hidden; box-shadow:0 12px 40px rgba(0,0,0,.25); background:#ddd; }
  .side img { width:100%; height:100%; object-fit:contain; display:block; background:#ddd; }
  .back { transform:rotateY(180deg); }
  .caption { margin-top:14px; background:rgba(255,255,255,.95); color:var(--text); padding:12px 14px; border-radius:12px; width:min(100%, 430px); }
  .caption .eyebrow { font-size:12px; text-transform:uppercase; letter-spacing:.08em; color:var(--muted); }
  .caption .title { font-size:21px; font-weight:700; margin-top:4px; }
  .caption .detail { font-size:14px; color:var(--muted); margin-top:4px; }
  .pager { margin-top:12px; color:#ddd; font-size:14px; }
  .thumbs { margin-top:24px; display:grid; grid-template-columns:repeat(auto-fill, minmax(84px, 1fr)); gap:10px; }
  .thumb { border:2px solid transparent; border-radius:10px; overflow:hidden; cursor:pointer; background:#444; }
  .thumb.active { border-color:white; }
  .thumb img { display:block; width:100%; height:auto; }
  @media (max-width: 820px) { .stage { grid-template-columns:1fr; } }
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <div>
      <h1>Pathway Design Cards</h1>
      <div class="sub">Flip through the full deck. Filter by HQ pathway element or system lens, then click the card or use the flip button.</div>
    </div>
    <div class="meta" id="deckCount"></div>
  </div>

  <div class="toolbar">
    <select id="elementFilter"><option value="">All elements</option></select>
    <select id="lensFilter"><option value="">All lenses</option></select>
    <button id="flipBtn">Flip card</button>
    <button id="resetBtn">Reset filters</button>
  </div>

  <div class="stage">
    <button class="navbtn" id="prevBtn">← Previous</button>
    <div class="cardbox">
      <div class="flip-wrap">
        <div class="flip" id="flipCard">
          <div class="side front"><img id="frontImg" alt="Card front"></div>
          <div class="side back"><img id="backImg" alt="Card back"></div>
        </div>
      </div>
      <div class="caption">
        <div class="eyebrow" id="cardId"></div>
        <div class="title" id="cardTitle"></div>
        <div class="detail" id="cardLens"></div>
      </div>
      <div class="pager" id="pager"></div>
    </div>
    <button class="navbtn" id="nextBtn">Next →</button>
  </div>

  <div class="thumbs" id="thumbs"></div>
</div>

const elementFilter = document.getElementById('elementFilter');
const lensFilter = document.getElementById('lensFilter');
const frontImg = document.getElementById('frontImg');
const backImg = document.getElementById('backImg');
const flipCard = document.getElementById('flipCard');
const cardId = document.getElementById('cardId');
const cardTitle = document.getElementById('cardTitle');
const cardLens = document.getElementById('cardLens');
const pager = document.getElementById('pager');
const thumbs = document.getElementById('thumbs');
const deckCount = document.getElementById('deckCount');

const uniqueElements = [...new Set(cards.map(c => c.element))];
const uniqueLenses = [...new Set(cards.map(c => c.lens))];
uniqueElements.forEach(v => {
  const o = document.createElement('option'); o.value = v; o.textContent = v; elementFilter.appendChild(o);
});
uniqueLenses.forEach(v => {
  const o = document.createElement('option'); o.value = v; o.textContent = v; lensFilter.appendChild(o);
});

let filtered = cards.slice();
let idx = 0;

function applyFilters() {
  filtered = cards.filter(c =>
    (!elementFilter.value || c.element === elementFilter.value) &&
    (!lensFilter.value || c.lens === lensFilter.value)
  );
  idx = 0;
  render();
}

function renderThumbs() {
  thumbs.innerHTML = '';
  filtered.forEach((c, i) => {
    const d = document.createElement('div');
    d.className = 'thumb' + (i === idx ? ' active' : '');
    d.innerHTML = `<img src="${c.front}" alt="${c.id}">`;
    d.onclick = () => { idx = i; render(); };
    thumbs.appendChild(d);
  });
}

function render() {
  if (!filtered.length) {
    frontImg.removeAttribute('src');
    backImg.removeAttribute('src');
    cardId.textContent = '';
    cardTitle.textContent = 'No cards match the selected filters';
    cardLens.textContent = '';
    pager.textContent = '';
    thumbs.innerHTML = '';
    deckCount.textContent = '0 cards';
    return;
  }
  const c = filtered[idx];
  frontImg.src = c.front;
  backImg.src = c.back;
  cardId.textContent = c.id;
  cardTitle.textContent = c.element;
  cardLens.textContent = c.lens;
  pager.textContent = `Card ${idx + 1} of ${filtered.length}`;
  deckCount.textContent = `${cards.length} cards in full deck`;
  flipCard.classList.remove('is-flipped');
  renderThumbs();
}

document.getElementById('prevBtn').onclick = () => {
  if (!filtered.length) return;
  idx = (idx - 1 + filtered.length) % filtered.length;
  render();
};
document.getElementById('nextBtn').onclick = () => {
  if (!filtered.length) return;
  idx = (idx + 1) % filtered.length;
  render();
};
document.getElementById('flipBtn').onclick = () => flipCard.classList.toggle('is-flipped');
flipCard.onclick = () => flipCard.classList.toggle('is-flipped');
document.getElementById('resetBtn').onclick = () => {
  elementFilter.value = '';
  lensFilter.value = '';
  applyFilters();
};
elementFilter.onchange = applyFilters;
lensFilter.onchange = applyFilters;
render();
</script>
